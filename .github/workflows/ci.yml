name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev/api/db extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,db]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: pytest

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Provide a .env for compose interpolation
        run: cp .env.example .env

      - name: Build all service images
        run: docker compose build
